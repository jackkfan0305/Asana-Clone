services:
  postgres:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.postgres
    environment:
      POSTGRES_DB: asana_clone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.app
    ports:
      - "8031:8030"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/asana_clone
      PORT: 8030
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.seed
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/asana_clone
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
